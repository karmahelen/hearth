name: "Security Auditing Suite"

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  schedule:
    - cron: '30 4 * * 4'

jobs:
  # 1. CODEQL SCAN
  codeql-analysis:
    name: CodeQL Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: 'python, javascript-typescript'

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  # 2. SEMGREP & BANDIT SCANS
  sast-scanners:
    name: Semgrep & Bandit Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Run Bandit (Python Specific Linter)
      - name: Install and Run Bandit
        run: |
          pip install bandit
          bandit -r . -f txt || true

      # Run Semgrep (General SAST Engine)
      - name: Run Semgrep OSS
        run: |
          python3 -m pip install semgrep
          semgrep ci --config=p/security-audit
